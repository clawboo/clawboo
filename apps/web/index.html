    <!-- Theme init — runs synchronously before React mounts to prevent FOUC.
         Reads localStorage('clawboo.theme'); fresh installs (no stored value)
         default to LIGHT so onboarding happens in light mode. Once the user
         picks a preference (light/dark/system) it's respected.
         Mirror of the resolver inside features/theme/ThemeProvider.tsx. -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('clawboo.theme');
          var pref =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'light';
          var resolved =
            pref === 'system'
              ? window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (_e) {
          /* fall back to default (no class) — light theme renders */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
