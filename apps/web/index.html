<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clawboo</title>
    <meta name="description" content="The open-source platform for deploying and orchestrating OpenClaw agent teams" />
    <link rel="icon" href="/favicon.svg" />

    <!-- DM Sans — body font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- Cabinet Grotesk — display font -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@800,700,500,400&display=swap" rel="stylesheet" />

    <!-- Theme init — runs synchronously before React mounts to prevent FOUC.
         Reads localStorage('clawboo.theme'), defaults to system preference.
         Mirror of the resolver inside features/theme/ThemeProvider.tsx. -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('clawboo.theme');
          var pref =
            stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'system';
          var resolved =
            pref === 'system'
              ? window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : pref;
          var root = document.documentElement;
          if (resolved === 'dark') root.classList.add('dark');
          else root.classList.remove('dark');
        } catch (_e) {
          /* fall back to default (no class) — light theme renders */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
