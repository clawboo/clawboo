name: Feature Request
description: Suggest an improvement or new feature
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What is frustrating today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Onboarding / Setup
        - Native runtime
        - Connected runtimes (Claude Code / Codex / Hermes / OpenClaw)
        - Group Chat
        - Board (tasks)
        - Atlas / Ghost Graph
        - Capabilities
        - Marketplace
        - Memory
        - Governance & budgets
        - Observability
        - Scheduler
        - Approvals
        - CLI / install
        - New area
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
