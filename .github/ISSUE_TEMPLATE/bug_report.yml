name: Bug Report
description: Report something that is broken
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `npx clawboo`
        2. Connect to Gateway
        3. Click on Ghost Graph tab
        4. See error in console
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Clawboo version
      description: Run `npx clawboo --version` or check package.json
      placeholder: '0.1.0'

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Ghost Graph
        - Chat Panel
        - Fleet Sidebar
        - Cost Dashboard
        - Scheduler
        - Approvals
        - Skill Marketplace
        - Gateway Connection
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, OS/browser info, etc.
