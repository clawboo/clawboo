name: Documentation issue
description: Something in the docs is wrong, missing, or unclear
title: '[Docs]: '
labels: ['documentation']
body:
  - type: markdown
    attributes:
      value: |
        The docs live at https://docs.claw.boo. Small fixes are also welcome as a direct PR.
  - type: input
    id: page
    attributes:
      label: Which page?
      description: URL or path under `docs/`.
      placeholder: https://docs.claw.boo/...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested fix (optional)
