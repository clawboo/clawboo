name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.count.outputs.has_changesets }}
    steps:
      - uses: actions/checkout@v4

      - name: Count changeset files
        id: count
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "changeset_count=$count"
          if [ "$count" -gt "0" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: [check]
    if: needs.check.outputs.has_changesets == 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: bash scripts/assemble-cli.sh

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
