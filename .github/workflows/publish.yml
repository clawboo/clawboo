name: Publish

on:
  push:
    branches: [main]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check for changesets
    runs-on: ubuntu-latest
    outputs:
      has_changesets: ${{ steps.count.outputs.has_changesets }}
    steps:
      - uses: actions/checkout@v4

      - name: Count changeset files
        id: count
        run: |
          count=$(find .changeset -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "changeset_count=$count"
          if [ "$count" -gt "0" ]; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    name: Publish packages
    runs-on: ubuntu-latest
    needs: [check]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      # Auth the pinned-SHA upstream fetches (raises the GitHub rate limit to
      # 5000/hr; the fetch helper also retries on a transient 429).
      - run: pnpm verify:ingest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build

      - run: bash scripts/assemble-cli.sh

      # Smoke-test the bundled CLI before publishing. Catches the class of
      # bug that v0.1.1 (Cannot GET /) and v0.1.2 (Unauthorized via port
      # collision) shipped broken on. Belt-and-suspenders even if the same
      # test ran on the PR — race conditions or upstream-changed lockfiles
      # could cause divergence.
      - run: pnpm test:clean-install

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
